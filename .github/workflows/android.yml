# Standardized Android CI template — Capacitor + Gradle
# Fixes the failure mode from Harmony/aixoverlay: builds were packaging
# stale/empty web assets because the web build step was missing before
# `npx cap sync` and `gradlew assembleDebug`.
#
# Drop this in as: .github/workflows/android.yml
# Adjust the `working-directory` and node version if your project differs.

name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # THE FIX — this step was missing before and caused stale APK builds.
      - name: Build web assets
        run: npm run build

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
